{% extends "base.html" %}
{% block title %}Sign Up - Vakeel Assist{% endblock %}
{% block content %}

<div style="max-width:480px; margin:20px auto;">
    <h2 style="font-size:20px; color:#1a2744; margin-bottom:4px;">Create Your Account</h2>
    <p style="font-family:Arial, sans-serif; font-size:13px; color:#6b7280; margin-bottom:20px;">
        Join fellow advocates already saving time with Vakeel Assist.
    </p>

    <form class="card-form" method="POST">
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="name" required placeholder="e.g. Adv. Karthik Raja">
        </div>
        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" placeholder="e.g. 9876543210">
        </div>
        <div class="form-group">
            <label>Bar Council Enrollment Number</label>
            <input type="text" name="bar_council_number" placeholder="e.g. TN/1234/2015">
        </div>
        <div class="form-group">
            <label>Password *</label>
            <input type="password" name="password" required minlength="6" placeholder="At least 6 characters">
        </div>
        <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <p style="font-family:Arial, sans-serif; font-size:13px; color:#6b7280; margin-top:14px; text-align:center;">
        Already have an account? <a href="{{ url_for('login') }}" style="color:#1a2744; font-weight:700;">Log in</a>
    </p>
</div>

{% endblock %}
