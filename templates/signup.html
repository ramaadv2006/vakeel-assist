{% extends "base.html" %}
{% block title %}Sign Up - Vakeel Assist{% endblock %}
{% block content %}

<div class="auth-container" style="max-width: 520px;">
    <div class="form-header">
        <h2>Create Your Account</h2>
        <p>Join fellow advocates already saving time with Vakeel Assist</p>
    </div>

    <form class="card-form" method="POST">
        <div class="form-group animated-input-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" required placeholder="e.g. Adv. Karthik Raja">
            <span class="focus-underline"></span>
        </div>
        <div class="form-group animated-input-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com">
            <span class="focus-underline"></span>
        </div>
        <div class="form-row">
            <div class="form-group animated-input-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="e.g. 9876543210">
                <span class="focus-underline"></span>
            </div>
            <div class="form-group animated-input-group">
                <label for="bar_council_number">Bar Enrollment No.</label>
                <input type="text" id="bar_council_number" name="bar_council_number" placeholder="e.g. TN/1234/2015">
                <span class="focus-underline"></span>
            </div>
        </div>
        <div class="form-group animated-input-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" required minlength="6" placeholder="Min. 6 characters">
            <span class="focus-underline"></span>
        </div>
        <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <div class="auth-footer">
        Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </div>
</div>

<script>
    document.body.classList.add('auth-page-bg');
</script>

{% endblock %}
