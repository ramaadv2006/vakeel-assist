{% extends "base.html" %}
{% block title %}Add Case - Vakeel Assist{% endblock %}
{% block content %}

<div class="form-container">
    <a href="{{ url_for('dashboard') }}" class="back-link">
        <svg class="icon-svg" viewBox="0 0 24 24" stroke="currentColor"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Dashboard
    </a>

    <div class="form-header">
        <h2>Add New Case</h2>
        <p>Record a new case file and set the hearing date schedule</p>
    </div>

    <form class="card-form" method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="client_name">Client Name *</label>
                <input type="text" id="client_name" name="client_name" required placeholder="e.g. Ramesh Kumar">
            </div>
            <div class="form-group">
                <label for="client_phone">Client Phone Number</label>
                <input type="tel" id="client_phone" name="client_phone" placeholder="e.g. 9876543210">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="case_number">Case Number *</label>
                <input type="text" id="case_number" name="case_number" required placeholder="e.g. CC 1234/2026">
            </div>
            <div class="form-group">
                <label for="court_name">Court Name *</label>
                <input type="text" id="court_name" name="court_name" required placeholder="e.g. Chennai District Court">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="case_type">Case Type</label>
                <select id="case_type" name="case_type">
                    <option value="">-- Select Type --</option>
                    <option>Civil</option>
                    <option>Criminal</option>
                    <option>Family</option>
                    <option>Property</option>
                    <option>Consumer</option>
                    <option>Labour</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="next_hearing_date">Next Hearing Date *</label>
                <input type="date" id="next_hearing_date" name="next_hearing_date" required>
            </div>
        </div>

        <div class="form-group">
            <label for="notes">Notes & Observations</label>
            <textarea id="notes" name="notes" placeholder="Any key comments, facts, or instructions regarding this hearing date..."></textarea>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" name="notify_client" id="notify_client">
            <label for="notify_client">Also send automated reminders directly to the client</label>
        </div>

        <button type="submit" class="btn-submit" style="margin-top: 8px;">Save Case File</button>
    </form>
</div>

{% endblock %}
