{% extends "base.html" %}
{% block title %}Add Case - Vakeel Assist{% endblock %}
{% block content %}

<div class="form-container">
    <a href="{{ url_for('dashboard') }}" class="back-link staggered-entry">
        <svg class="icon-svg" viewBox="0 0 24 24" stroke="currentColor"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Dashboard
    </a>

    <div class="form-header staggered-entry">
        <h2>Add New Case</h2>
        <p>Record a new case file and set the hearing date schedule</p>
    </div>

    <form class="card-form staggered-entry" method="POST" novalidate>
        <div class="form-row">
            <div class="form-group">
                <label for="client_name">Client Name *</label>
                <input type="text" id="client_name" name="client_name" required placeholder="e.g. Ramesh Kumar">
            </div>
            <div class="form-group">
                <label for="client_phone">Client Phone Number</label>
                <input type="tel" id="client_phone" name="client_phone" placeholder="e.g. 9876543210">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="case_number">Case Number *</label>
                <input type="text" id="case_number" name="case_number" required placeholder="e.g. CC 1234/2026">
            </div>
            <div class="form-group">
                <label for="court_name">Court Name *</label>
                <input type="text" id="court_name" name="court_name" required placeholder="e.g. Chennai District Court">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="case_type">Case Type</label>
                <select id="case_type" name="case_type">
                    <option value="">-- Select Type --</option>
                    <option>Civil</option>
                    <option>Criminal</option>
                    <option>Family</option>
                    <option>Property</option>
                    <option>Consumer</option>
                    <option>Labour</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="next_hearing_date">Next Hearing Date *</label>
                <input type="date" id="next_hearing_date" name="next_hearing_date" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="opposing_counsel">Opposing Counsel Name</label>
                <input type="text" id="opposing_counsel" name="opposing_counsel" placeholder="e.g. Adv. Suresh Babu">
            </div>
            <div class="form-group">
                <label for="opposing_counsel_phone">Opposing Counsel Phone</label>
                <input type="tel" id="opposing_counsel_phone" name="opposing_counsel_phone" placeholder="e.g. 9876543210">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group" style="grid-column: 1 / -1;">
                <label for="judge_name">Presiding Judge / Bench</label>
                <input type="text" id="judge_name" name="judge_name" placeholder="e.g. Hon'ble Justice Ramachandran">
            </div>
        </div>

        <div class="form-group">
            <label for="notes">Notes & Observations</label>
            <textarea id="notes" name="notes" placeholder="Any key comments, facts, or instructions regarding this hearing date..."></textarea>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" name="notify_client" id="notify_client">
            <label for="notify_client">Also send automated reminders directly to the client</label>
        </div>

        <button type="submit" class="btn-submit" style="margin-top: 8px;">Save Case File</button>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.querySelector('.card-form');
        if (form) {
            form.addEventListener('submit', (e) => {
                const requiredInputs = form.querySelectorAll('[required]');
                let hasEmpty = false;
                requiredInputs.forEach(input => {
                    if (!input.value.trim()) {
                        hasEmpty = true;
                        input.style.borderColor = 'var(--danger)';
                        input.classList.add('shake-error');
                        setTimeout(() => input.classList.remove('shake-error'), 400);
                    } else {
                        input.style.borderColor = '';
                    }
                });
                
                if (hasEmpty) {
                    e.preventDefault();
                    form.classList.add('shake-error');
                    setTimeout(() => form.classList.remove('shake-error'), 400);
                }
            });
        }
    });
</script>
{% endblock %}
