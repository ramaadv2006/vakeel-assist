{% extends "base.html" %}
{% block title %}Log In - Vakeel Assist{% endblock %}
{% block content %}

<div class="auth-container">
    <div class="form-header">
        <h2>Welcome Back</h2>
        <p>Log in to manage your case diary and schedules</p>
    </div>

    <form class="card-form" method="POST">
        <div class="form-group animated-input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com">
            <span class="focus-underline"></span>
        </div>
        <div class="form-group animated-input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
            <span class="focus-underline"></span>
        </div>
        <button type="submit" class="btn-submit">Log In</button>
    </form>

    <div class="auth-footer">
        New here? <a href="{{ url_for('signup') }}">Create an account</a>
    </div>
</div>

<script>
    document.body.classList.add('auth-page-bg');
</script>

{% endblock %}
