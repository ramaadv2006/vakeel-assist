{% extends "base.html" %}
{% block title %}Log In - Vakeel Assist{% endblock %}
{% block content %}

<div style="max-width:420px; margin:20px auto;">
    <h2 style="font-size:20px; color:#1a2744; margin-bottom:4px;">Welcome Back</h2>
    <p style="font-family:Arial, sans-serif; font-size:13px; color:#6b7280; margin-bottom:20px;">
        Log in to view your cases and hearing dates.
    </p>

    <form class="card-form" method="POST">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-submit">Log In</button>
    </form>

    <p style="font-family:Arial, sans-serif; font-size:13px; color:#6b7280; margin-top:14px; text-align:center;">
        New here? <a href="{{ url_for('signup') }}" style="color:#1a2744; font-weight:700;">Create an account</a>
    </p>
</div>

{% endblock %}
