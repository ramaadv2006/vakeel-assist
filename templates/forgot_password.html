{% extends "base.html" %}
{% block title %}Forgot Password - Vakeel Assist{% endblock %}
{% block content %}

<div class="auth-container">
    <div class="form-header staggered-entry">
        <h2>Forgot Password</h2>
        <p>Enter your registered email address to generate a password reset link</p>
    </div>

    <form class="card-form" method="POST">
        <div class="form-group floating-group staggered-entry">
            <input type="email" id="email" name="email" required placeholder=" ">
            <label for="email">Email Address</label>
        </div>
        <button type="submit" class="btn-submit staggered-entry">Generate Reset Link</button>
    </form>

    <div class="auth-footer staggered-entry" style="margin-top: 18px;">
        Remembered your password? <a href="{{ url_for('login') }}">Back to Login</a>
    </div>
</div>

<script>
    document.body.classList.add('auth-page-bg');
</script>

{% endblock %}
