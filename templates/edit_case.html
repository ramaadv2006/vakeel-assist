{% extends "base.html" %}
{% block title %}Edit Case - Vakeel Assist{% endblock %}
{% block content %}

<div class="form-container">
    <a href="{{ url_for('dashboard') }}" class="back-link">
        <svg class="icon-svg" viewBox="0 0 24 24" stroke="currentColor"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back to Dashboard
    </a>

    <div class="form-header">
        <h2>Edit Case File</h2>
        <p>Modify client details, status, notes, or reschedule the next hearing date</p>
    </div>

    <form class="card-form" method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="client_name">Client Name *</label>
                <input type="text" id="client_name" name="client_name" required value="{{ case['client_name'] }}">
            </div>
            <div class="form-group">
                <label for="client_phone">Client Phone Number</label>
                <input type="tel" id="client_phone" name="client_phone" value="{{ case['client_phone'] or '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="case_number">Case Number *</label>
                <input type="text" id="case_number" name="case_number" required value="{{ case['case_number'] }}">
            </div>
            <div class="form-group">
                <label for="court_name">Court Name *</label>
                <input type="text" id="court_name" name="court_name" required value="{{ case['court_name'] }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="case_type">Case Type</label>
                <select id="case_type" name="case_type">
                    <option value="">-- Select Type --</option>
                    {% for t in ['Civil', 'Criminal', 'Family', 'Property', 'Consumer', 'Labour', 'Other'] %}
                    <option {% if case['case_type']==t %}selected{% endif %}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="next_hearing_date">Next Hearing Date *</label>
                <input type="date" id="next_hearing_date" name="next_hearing_date" required value="{{ case['next_hearing_date'] }}">
            </div>
        </div>

        <div class="form-group">
            <label for="notes">Notes & Observations</label>
            <textarea id="notes" name="notes">{{ case['notes'] or '' }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="status">Case Status</label>
                <select id="status" name="status">
                    <option {% if case['status']=='Active' %}selected{% endif %}>Active</option>
                    <option {% if case['status']=='Closed' %}selected{% endif %}>Closed</option>
                    <option {% if case['status']=='On Hold' %}selected{% endif %}>On Hold</option>
                </select>
            </div>
            <div class="form-group checkbox-group" style="justify-content: center;">
                <input type="checkbox" name="notify_client" id="notify_client" {% if case['notify_client'] %}checked{% endif %}>
                <label for="notify_client">Also send automated reminders directly to the client</label>
            </div>
        </div>

        <button type="submit" class="btn-submit" style="margin-top: 8px;">Update Case File</button>
    </form>
</div>

{% endblock %}
