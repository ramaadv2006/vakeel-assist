{% extends "base.html" %}
{% block title %}Edit Case - Vakeel Assist{% endblock %}
{% block content %}

<a href="{{ url_for('dashboard') }}" class="back-link">&larr; Back to Dashboard</a>

<form class="card-form" method="POST">
    <div class="form-group">
        <label>Client Name *</label>
        <input type="text" name="client_name" required value="{{ case['client_name'] }}">
    </div>
    <div class="form-group">
        <label>Client Phone</label>
        <input type="tel" name="client_phone" value="{{ case['client_phone'] or '' }}">
    </div>
    <div class="form-group">
        <label>Case Number *</label>
        <input type="text" name="case_number" required value="{{ case['case_number'] }}">
    </div>
    <div class="form-group">
        <label>Court Name *</label>
        <input type="text" name="court_name" required value="{{ case['court_name'] }}">
    </div>
    <div class="form-group">
        <label>Case Type</label>
        <select name="case_type">
            <option value="">-- Select --</option>
            {% for t in ['Civil', 'Criminal', 'Family', 'Property', 'Consumer', 'Labour', 'Other'] %}
            <option {% if case['case_type']==t %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label>Next Hearing Date *</label>
        <input type="date" name="next_hearing_date" required value="{{ case['next_hearing_date'] }}">
    </div>
    <div class="form-group">
        <label>Notes</label>
        <textarea name="notes">{{ case['notes'] or '' }}</textarea>
    </div>
    <div class="form-group" style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" name="notify_client" id="notify_client" style="width:auto;" {% if case['notify_client'] %}checked{% endif %}>
        <label for="notify_client" style="margin:0;">Also send a reminder to the client on WhatsApp/SMS</label>
    </div>
    <div class="form-group">
        <label>Status</label>
        <select name="status">
            <option {% if case['status']=='Active' %}selected{% endif %}>Active</option>
            <option {% if case['status']=='Closed' %}selected{% endif %}>Closed</option>
            <option {% if case['status']=='On Hold' %}selected{% endif %}>On Hold</option>
        </select>
    </div>
    <button type="submit" class="btn-submit">Update Case</button>
</form>

{% endblock %}
